name: Build Universal Mac Executable (Backwards Compatible)

on:
  push:
    branches: [ "main" ]

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

- name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We add numpy explicitly here so PyInstaller doesn't crash
        pip install pyinstaller pandas numpy openpyxl

    - name: Package with PyInstaller as Universal2
      env:
        MACOSX_DEPLOYMENT_TARGET: "11.0"
      run: |
        pyinstaller --onefile --target-arch universal2 main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: mac-universal-executable
        path: dist/
