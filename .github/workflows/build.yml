name: Build Universal Mac Executable (Backwards Compatible)

on:
  push:
    branches: [ "main" ]

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # We use stable Python 3.11 here so PyInstaller handles compilation perfectly
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Package with PyInstaller as Universal2
      env:
        # This tells the compiler to make the app backward-compatible down to macOS 11.0
        MACOSX_DEPLOYMENT_TARGET: "11.0"
      run: |
        # It targets universal2 so it runs on both Apple Silicon and Intel
        pyinstaller --onefile --target-arch universal2 main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: mac-universal-executable
        path: dist/
