name: Build Mac Intel Executable (Backwards Compatible)

on:
  push:
    branches: [ "main" ]

jobs:
  build-macos:
    # Changed to the active, live Intel runner label!
    runs-on: macos-15-intel  

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas numpy openpyxl

    - name: Package with PyInstaller for Intel
      env:
        MACOSX_DEPLOYMENT_TARGET: "11.0"
      run: |
        pyinstaller --onefile --target-arch x86_64 main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: mac-intel-executable
        path: dist/
