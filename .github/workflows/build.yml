name: Build All Platforms

on:
  push:
    branches: [ "main" ]

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl
    - name: Package with PyInstaller
      run: pyinstaller --onefile -n grade-conv main.py
    - uses: actions/upload-artifact@v4
      with:
        name: build-windows
        path: dist/grade-conv.exe


  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl
    - name: Package with PyInstaller
      env:
        MACOSX_DEPLOYMENT_TARGET: "11.0"
      run: pyinstaller --onefile --target-arch universal2 -n grade-conv main.py
    - uses: actions/upload-artifact@v4
      with:
        name: build-mac
        path: dist/grade-conv


  package:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: build-windows
        path: "release/grade conv for windows/"
    - uses: actions/download-artifact@v4
      with:
        name: build-mac
        path: "release/grade conv for mac/"
    - name: Fix Mac permissions and copy readme
      run: |
        chmod +x "release/grade conv for mac/grade-conv"
        cp README.md release/
    - uses: actions/upload-artifact@v4
      with:
        name: grade-conv
        path: release/
