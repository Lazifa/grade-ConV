name: Build All Platforms

on:
  push:
    branches: [ "main" ]

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas "numpy<2" openpyxl

    - name: Package with PyInstaller
      run: pyinstaller --onedir --exclude-module matplotlib --exclude-module PIL --exclude-module scipy main.py

    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: build-windows
        path: dist/main/


  build-mac-intel:
    runs-on: macos-15-intel
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas "numpy<2" openpyxl

    - name: Package with PyInstaller
      env:
        MACOSX_DEPLOYMENT_TARGET: "11.0"
      run: pyinstaller --onedir --target-arch x86_64 --exclude-module matplotlib --exclude-module PIL --exclude-module scipy main.py

    - name: Upload Mac Intel build
      uses: actions/upload-artifact@v4
      with:
        name: build-mac-intel
        path: dist/main/


  build-mac-arm:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl

    - name: Package with PyInstaller
      env:
        MACOSX_DEPLOYMENT_TARGET: "11.0"
      run: pyinstaller --onedir --target-arch arm64 --exclude-module matplotlib --exclude-module PIL --exclude-module scipy main.py

    - name: Upload Mac ARM build
      uses: actions/upload-artifact@v4
      with:
        name: build-mac-arm
        path: dist/main/


  package:
    needs: [build-windows, build-mac-intel, build-mac-arm]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows build
      uses: actions/download-artifact@v4
      with:
        name: build-windows
        path: release/windows/

    - name: Download Mac Intel build
      uses: actions/download-artifact@v4
      with:
        name: build-mac-intel
        path: release/mac-intel/

    - name: Download Mac ARM build
      uses: actions/download-artifact@v4
      with:
        name: build-mac-arm
        path: release/mac-arm/

    - name: Fix Mac executable permissions
      run: |
        chmod +x release/mac-intel/main
        chmod +x release/mac-arm/main

    - name: Zip all platforms
      run: |
        cd release
        zip -r ../grade-conv-all-platforms.zip .

    - name: Upload final zip
      uses: actions/upload-artifact@v4
      with:
        name: grade-conv-all-platforms
        path: grade-conv-all-platforms.zip
